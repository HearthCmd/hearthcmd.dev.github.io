<svg width="1024" height="1024" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="squircle">
      <path d="M 90 0 C 30 0, 0 30, 0 90 L 0 130 C 0 190, 30 220, 90 220 L 130 220 C 190 220, 220 190, 220 130 L 220 90 C 220 30, 190 0, 130 0 Z"/>
    </clipPath>
    <linearGradient id="bg-warm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a1810"/>
      <stop offset="100%" stop-color="#1a0a06"/>
    </linearGradient>
    <linearGradient id="amber-vert" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#d94a17"/>
      <stop offset="50%" stop-color="#f5a02e"/>
      <stop offset="100%" stop-color="#ffe082"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- Background -->
    <rect width="220" height="220" fill="url(#bg-warm)"/>

    <!-- Chevron: option C — same 80% size, vertically centered on house midpoint -->
    <!-- Span 76px, top=74, peak=112, bottom=150 -->
    <path d="M 48 150 L 84 112 L 48 74"
          fill="none" stroke="#f5d4a8" stroke-width="10"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Chimney -->
    <rect x="160" y="78" width="14" height="22" fill="#a82d10"/>

    <!-- Heart smoke (faint, 22% opacity) -->
    <path d="M 167 70
             C 162 65, 156 60, 156 54
             C 156 50, 159 47, 162 47
             C 164 47, 166 49, 167 51
             C 168 49, 170 47, 172 47
             C 175 47, 178 50, 178 54
             C 178 60, 172 65, 167 70 Z"
          fill="#f5a02e" opacity="0.22"/>

    <!-- House body -->
    <path d="M 100 160 L 100 102 L 142 65 L 184 102 L 184 160 Z"
          fill="url(#amber-vert)"/>

    <!-- Window with glow -->
    <circle cx="142" cy="120" r="11" fill="#3a1810"/>
    <circle cx="142" cy="120" r="6" fill="#ffe082"/>
  </g>
</svg>
